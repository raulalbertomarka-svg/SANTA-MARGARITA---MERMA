<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SISTEMA RELEVAMIENTO SANTA MARGARITA - MERMA</title>
  <style>
    :root { 
      --verde-santa-margarita: #004d33; 
      --verde-claro: #f1f8e9;
      --rojo-alerta: #d32f2f; 
      --dorado-santa-margarita: #c5a059; 
      --gris-fondo: #f0f2f5; 
      --blanco: #ffffff;
    }
    body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--gris-fondo); padding: 10px; margin: 0; text-transform: uppercase; }
    .container { background: var(--blanco); padding: 25px; border-radius: 15px; max-width: 650px; margin: auto; box-shadow: 0 8px 25px rgba(0,0,0,0.1); border-top: 8px solid var(--verde-santa-margarita); }
    .header-santa { text-align: center; margin-bottom: 25px; }
    .header-santa h2 { font-family: 'Georgia', serif; color: var(--verde-santa-margarita); font-size: 32px; margin: 0; font-weight: bold; }
    .header-santa h4 { color: #555; margin: 0; font-size: 12px; letter-spacing: 3px; font-weight: bold; }
    label { font-weight: bold; display: block; margin-top: 20px; color: var(--verde-santa-margarita); font-size: 13px; }
    input, select, textarea { width: 100%; padding: 14px; margin-top: 6px; border: 2px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; text-transform: uppercase; font-size: 14px; }
    
    .p-prod { border: 2px solid var(--verde-santa-margarita) !important; background-color: var(--verde-claro); font-weight: bold; }
    .input-error { border: 3px solid var(--rojo-alerta) !important; background-color: #ffebee !important; }
    .msg-error { color: var(--rojo-alerta); font-size: 10px; font-weight: bold; margin-top: 5px; display: none; }

    .pregunta-contenedor { background: var(--verde-claro); padding: 20px; border-radius: 12px; margin: 20px 0; text-align: center; border: 1px solid #c8e6c9; }
    .botones-decision { display: flex; gap: 15px; max-width: 250px; margin: auto; margin-top: 15px; }
    .btn-sn { flex: 1; padding: 12px; border: 2px solid #ccc; border-radius: 8px; background: white; cursor: pointer; font-weight: bold; }
    .active-si { background: var(--verde-santa-margarita) !important; color: white; border-color: var(--verde-santa-margarita); }
    .active-no { background: var(--rojo-alerta) !important; color: white; border-color: var(--rojo-alerta); }
    
    .seccion-productos { display: none; margin-top: 15px; }
    .producto-row { background: white; padding: 18px; margin-bottom: 15px; border-left: 6px solid var(--verde-santa-margarita); border-radius: 8px; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .btn-add { background: var(--verde-santa-margarita); color: white; width: 100%; padding: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    .btn-remove { background: #ff5252; color: white; font-size: 11px; padding: 8px 12px; border: none; border-radius: 5px; margin-top: 12px; cursor: pointer; float: right; font-weight: bold; }
    .btn-enviar { width: 100%; background: var(--verde-santa-margarita); color: white; margin-top: 40px; font-size: 18px; padding: 22px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
  </style>
</head>

<div class="container">
  <div class="header-santa">

  </div>

    <label>PUNTO DE VENTA</label>
    <select id="pdv" required>
      <option value="">-- PRIMERO SELECCIONE RELEVADOR --</option>
    </select>

    <div id="panel-merma">
        <div class="pregunta-contenedor">
            <span style="font-size: 13px; font-weight: bold; color: var(--verde-santa-margarita);">¿HAY PRODUCTOS QUE PASAN A MERMA?</span>
            <div class="botones-decision">
              <button type="button" id="merma-si" class="btn-sn" onclick="decidirCarga('merma', true)">SÍ</button>
              <button type="button" id="merma-no" class="btn-sn" onclick="decidirCarga('merma', false)">NO</button>
            </div>
        </div>
        <div id="seccion-merma" class="seccion-productos">
            <div id="cont-merma"></div>
            <button type="button" class="btn-add" onclick="agregarFila()">+ AÑADIR PRODUCTO</button>
        </div>
    </div>

    <div class="pregunta-contenedor" style="margin-top:30px;">
        <span style="font-size: 13px; font-weight: bold; color: var(--verde-santa-margarita);">¿TIENES ALGUNA OBSERVACIÓN?</span>
        <div class="botones-decision">
          <button type="button" id="obs-si" class="btn-sn" onclick="decidirObs(true)">SÍ</button>
          <button type="button" id="obs-no" class="btn-sn" onclick="decidirObs(false)">NO</button>
        </div>
        <div id="campo-observacion" style="display:none; margin-top:15px;">
            <textarea id="texto-observacion" rows="3" placeholder="ESCRIBA SU OBSERVACIÓN AQUÍ..."></textarea>
        </div>
    </div>

    <button type="submit" class="btn-enviar" id="btnEnvio">ENVIAR REPORTE</button>
  </form>
</div>

function actualizarPDV() {
  const relevadorSeleccionado = document.getElementById("vendedor").value;
  const selectPDV = document.getElementById("pdv");
  selectPDV.innerHTML = '<option value="">-- SELECCIONE PDV --</option>';
  if (relevadorSeleccionado && datosPDV[relevadorSeleccionado]) {
    datosPDV[relevadorSeleccionado].forEach(pdv => {
      let option = document.createElement("option");
      option.value = pdv;
      option.textContent = pdv;
      selectPDV.appendChild(option);
    });
  }
}

let respuestas = { merma: null, obs: null };

function decidirCarga(tipo, tiene) {
  respuestas[tipo] = tiene;
  document.getElementById(`${tipo}-si`).className = tiene ? 'btn-sn active-si' : 'btn-sn';
  document.getElementById(`${tipo}-no`).className = !tiene ? 'btn-sn active-no' : 'btn-sn';
  document.getElementById(`seccion-${tipo}`).style.display = tiene ? "block" : "none";
  const cont = document.getElementById(`cont-${tipo}`);
  if (tiene && cont.children.length === 0) agregarFila();
}

function decidirObs(tiene) {
  respuestas.obs = tiene;
  document.getElementById('obs-si').className = tiene ? 'btn-sn active-si' : 'btn-sn';
  document.getElementById('obs-no').className = !tiene ? 'btn-sn active-no' : 'btn-sn';
  document.getElementById('campo-observacion').style.display = tiene ? "block" : "none";
  if(!tiene) document.getElementById('texto-observacion').value = "";
}

function validarProducto(input) {
  const row = input.parentElement;
  const errorMsg = row.querySelector(".msg-error");
  if (input.value === "" || PRODUCTOS_VALIDOS.includes(input.value)) {
    input.classList.remove('input-error');
    if(errorMsg) errorMsg.style.display = "none";
  } else {
    input.classList.add('input-error');
    if(errorMsg) errorMsg.style.display = "block";
  }
}

function agregarFila() {
  const contenedor = document.getElementById(`cont-merma`);
  const div = document.createElement("div");
  div.className = "producto-row";
  
  div.innerHTML = `
    <label>PRODUCTO A MERMA</label>
    <input type="text" list="lista-productos-datalist" class="p-prod" placeholder="BUSCAR PRODUCTO..." oninput="validarProducto(this)" required autocomplete="off">
    <span class="msg-error">⚠️ DEBE SELECCIONAR UN PRODUCTO DE LA LISTA</span>
    
    <div style="display:flex; flex-direction:column; gap:10px; margin-top:10px;">
      <div style="flex:1">
        <label>FECHA DE VENCIMIENTO</label>
        <input type="date" class="p-vencimiento" required>
      </div>
      <div style="flex:1">
        <label>CANT. (OBLIGATORIO)</label>
        <input type="number" class="p-cant" min="1" placeholder="EJ: 5" required>
      </div>
    </div>
    <button type="button" class="btn-remove" onclick="this.parentElement.remove()">ELIMINAR</button><div style="clear:both"></div>`;
  contenedor.appendChild(div);
}

document.getElementById("formulario").onsubmit = function(e) {
  e.preventDefault();
  
  if (respuestas.merma === null) { 
    alert("POR FAVOR SELECCIONE SI HAY PRODUCTOS A MERMA."); 
    return; 
  }
  
  if (respuestas.obs === null) {
    alert("POR FAVOR RESPONDA SI TIENE ALGUNA OBSERVACIÓN.");
    return;
  }

  let inputsProductos = document.querySelectorAll(".p-prod");
  let hayErrores = false;
  inputsProductos.forEach(input => {
    if (!PRODUCTOS_VALIDOS.includes(input.value)) {
      input.classList.add('input-error');
      const errorMsg = input.parentElement.querySelector(".msg-error");
      if(errorMsg) errorMsg.style.display = "block";
      hayErrores = true;
    }
  });

  if (hayErrores) {
    alert("❌ NO SE PUEDE ENVIAR: HAY PRODUCTOS NO VÁLIDOS EN LA LISTA.");
    return;
  }

  const btn = document.getElementById("btnEnvio");
  btn.disabled = true; btn.innerText = "ENVIANDO...";

  const payload = {
    relevador: document.getElementById("vendedor").value,
    pdv: document.getElementById("pdv").value,
    merma: [],
    observaciones: document.getElementById("texto-observacion").value
  };

  document.querySelectorAll("#cont-merma .producto-row").forEach(r => {
    payload.merma.push({ 
        producto: r.querySelector(".p-prod").value, 
        vencimiento: r.querySelector(".p-vencimiento").value,
        cant: r.querySelector(".p-cant").value 
    });
  });

  // RECUERDA CAMBIAR ESTA URL POR LA DE TU DESPLIEGUE EN APPS SCRIPT
  fetch("https://script.google.com/macros/s/AKfycbwehtGHHuGcTnafZmJuHmzakwh-705WdF48kzRs_CxRljKQoEsFosmzFuZEDGJ0aAeDOw/exec", {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(payload)
  }).then(() => { 
    alert("REPORTE DE MERMA ENVIADO CORRECTAMENTE"); 
    location.reload(); 
  }).catch(err => {
    alert("ERROR AL ENVIAR. VERIFIQUE SU CONEXIÓN.");
    btn.disabled = false; btn.innerText = "ENVIAR REPORTE";
  });
};
</script>
